name: backstage-build

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: vanbor-backstage
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Short Commit ID
        run: |
          echo "COMMIT_ID=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable

      - name: Install Dependencies
        run: |
          cd backstage
          yarn install --immutable

      # --- FIX 1: Compile the entire codebase topology first ---
      - name: Type Check and Build Packages
        run: |
          cd backstage
          yarn tsc
          yarn build:all

      # --- FIX 2: Generate production bundles inside the correct working directory ---
      - name: Build Backstage Backend Bundle
        run: |
          cd backstage
          yarn build:backend --directory packages/backend/dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- FIX 3: Shift the Docker context into the backstage folder ---
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.COMMIT_ID }} \
            ./backstage

      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.COMMIT_ID }}

      - name: Output Image
        run: |
          echo "Image pushed:"
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.COMMIT_ID }}"